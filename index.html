<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animal & Shape Sound Cards</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 12px 18px;
            border-radius: 25px;
            border: none;
            width: 280px;
            max-width: 100%;
        }

        .filter-btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            cursor: pointer;
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.playing {
            background: #667eea;
            color: white;
        }

        .card-title {
            font-weight: bold;
        }

        .card-type {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
        }

        .status-bar.show {
            display: flex;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🎵 Animal & Shape Cards</h1>
    <p class="subtitle">Click to hear sounds</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search..." />
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="animal">Animals</button>
        <button class="filter-btn" data-filter="shape">Shapes</button>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
</div>

<div class="status-bar" id="statusBar">
    <span id="statusText">Playing...</span>
</div>

<script src="sounds.js"></script>

<script>
const cardsData = [
    { name: 'Train', type: 'shape', soundKey: 'train' },
    { name: 'Maze', type: 'shape', soundKey: 'maze' },
    { name: 'Duck', type: 'animal', soundKey: 'duck' },
    { name: 'Flower', type: 'shape', soundKey: 'flower' },
    { name: 'Elephant', type: 'animal', soundKey: 'elephant' },
    { name: 'Owl', type: 'animal', soundKey: 'owl' }
];

let filteredCards = [...cardsData];
let currentAudio = null;
let currentFilter = 'all';

const grid = document.getElementById("cardsGrid");
const searchInput = document.getElementById("searchInput");
const statusBar = document.getElementById("statusBar");
const statusText = document.getElementById("statusText");

function renderCards() {
    grid.innerHTML = "";

    filteredCards.forEach(card => {
        const div = document.createElement("div");
        div.className = `card ${card.type}`;

        div.innerHTML = `
            <div class="card-title">${card.name}</div>
            <div class="card-type">${card.type}</div>
        `;

        div.onclick = () => playSound(card, div);

        grid.appendChild(div);
    });
}

function playSound(card, el) {
    const map = window.AUDIO_MAP;

    if (!map || !map[card.soundKey]) {
        statusText.textContent = "Audio not loaded or missing";
        statusBar.classList.add("show");
        return;
    }

    if (currentAudio) {
        currentAudio.pause();
    }

    document.querySelectorAll(".card").forEach(c => c.classList.remove("playing"));
    el.classList.add("playing");

    currentAudio = new Audio(map[card.soundKey]);
    currentAudio.play().catch(err => {
        statusText.textContent = "Audio blocked or failed";
    });

    statusText.textContent = "Playing: " + card.name;
    statusBar.classList.add("show");

    currentAudio.onended = () => {
        el.classList.remove("playing");
        statusBar.classList.remove("show");
    };
}

searchInput.addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();

    filteredCards = cardsData.filter(c =>
        c.name.toLowerCase().includes(q) &&
        (currentFilter === "all" || c.type === currentFilter)
    );

    renderCards();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        currentFilter = btn.dataset.filter;

        filteredCards = cardsData.filter(c =>
            currentFilter === "all" || c.type === currentFilter
        );

        renderCards();
    });
});

renderCards();
</script>

</body>
</html>
